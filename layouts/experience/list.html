{{ define "main" }}
  <section class="projects-page section-page">
    <div class="projects-page__shell">
      <aside class="projects-page__rail" aria-label="Experience sections">
        <a href="#nayatel">Nayatel</a>
        <a href="#plc-group">PLC Group</a>
        <a href="#focus-areas">Focus Areas</a>
      </aside>

      <div class="projects-page__main">
        <header class="projects-page__header">
          <p class="landing-hero__kicker">Career</p>
          <h1>{{ .Title }}</h1>
          {{ with .Params.description }}
            <p>{{ . }}</p>
          {{ end }}
        </header>
        <div class="content">{{ .Content }}</div>
      </div>
    </div>
  </section>
{{ end }}

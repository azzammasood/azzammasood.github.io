<footer class="footer bg-transparent">
  <section class="landing-links" aria-label="Social and site links">
    <div class="landing-links__inner">
      <div class="landing-links__brand">
        <h2>{{ site.Params.logo_text | default .Site.Title }}</h2>
        <p>Reliable data systems, built for scale.</p>
      </div>

      <nav class="landing-link-group" aria-label="Socials">
        <h3>Socials</h3>
        {{ range site.Data.social.main }}
          <a href="{{ .link | safeURL }}" target="_blank" rel="noopener">{{ .name | title }}</a>
        {{ end }}
        <a href="mailto:ahmaduzzammasood@gmail.com">Email</a>
      </nav>

      <nav class="landing-link-group" aria-label="Sitemap">
        <h3>Sitemap</h3>
        {{ range site.Menus.main }}
          <a href="{{ .URL | relLangURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>

      <nav class="landing-link-group" aria-label="Other">
        <h3>Other</h3>
        <a href="https://github.com/azzammasood" target="_blank" rel="noopener">Source Code</a>
        <a href="{{ `/blog/` | relLangURL }}">Case Studies</a>
      </nav>
    </div>
  </section>
</footer>

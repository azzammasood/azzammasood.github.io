{{ define "main" }}
  <section class="projects-page section-page contact-page">
    <div class="projects-page__shell">
      <aside class="projects-page__rail" aria-label="Contact methods">
        <a href="#email">Email</a>
        <a href="#mobile">Mobile</a>
        <a href="#linkedin">LinkedIn</a>
        <a href="#github">GitHub</a>
      </aside>

      <div class="projects-page__main">
        <header class="projects-page__header">
          <p class="landing-hero__kicker">Get in touch</p>
          <h1>{{ .Title }}</h1>
          {{ with .Params.description }}
            <p>{{ . }}</p>
          {{ end }}
        </header>

        <div class="contact-list">
          <a id="email" href="mailto:ahmaduzzammasood@gmail.com">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <span>ahmaduzzammasood@gmail.com</span>
          </a>
          <a id="mobile" href="tel:+923165279665">
            <i class="fa-solid fa-phone" aria-hidden="true"></i>
            <span>+92 316 5279665</span>
          </a>
          <a id="linkedin" href="https://www.linkedin.com/in/azzammasood/" target="_blank" rel="noopener">
            <i class="fab fa-linkedin" aria-hidden="true"></i>
            <span>linkedin.com/in/azzammasood</span>
          </a>
          <a id="github" href="https://github.com/azzammasood" target="_blank" rel="noopener">
            <i class="fab fa-github" aria-hidden="true"></i>
            <span>github.com/azzammasood</span>
          </a>
        </div>

        <div class="content">
          {{ .Content }}
        </div>
      </div>
    </div>
  </section>
{{ end }}
